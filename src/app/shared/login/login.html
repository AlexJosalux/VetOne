<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar/Sesion</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto bg-[#fafaf9] rounded-xl shadow-lg overflow-hidden md:max-w-2xl border border-stone-200">
            <div class="p-8">
                <div class="flex justify-center mb-8">
                    <button id="loginTab" class="px-6 py-2 font-medium text-white bg-[#5c4033] rounded-l-lg focus:outline-none">
                        Iniciar
                    </button>
                    <button id="signupTab" class="px-6 py-2 font-medium text-[#5c4033] bg-white border border-[#5c4033] rounded-r-lg focus:outline-none">
                        Sesion
                    </button>
                </div>

                <form (ngSubmit)="iniciarSesion()" id="loginForm" class="space-y-6">
                    <h2 class="text-2xl font-bold text-center text-[#442c1e]">Iniciar Sesion</h2>
                    <div>
                        <label for="loginEmail" class="block text-sm font-medium text-stone-700">Correo Electrónico</label>
                        <input [(ngModel)]="email" name="email" type="email" id="loginEmail" required class="mt-1 block w-full px-3 py-2 border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-[#8b5e3c] focus:border-[#8b5e3c] bg-stone-50">
                    </div>
                    <div>
                        <label for="loginPassword" class="block text-sm font-medium text-stone-700">Contraseña</label>
                        <input [(ngModel)]="password" name="password" type="password" id="loginPassword" required class="mt-1 block w-full px-3 py-2 border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-[#8b5e3c] focus:border-[#8b5e3c] bg-stone-50">
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-[#8b5e3c] focus:ring-[#8b5e3c] border-stone-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-stone-700">Recordarme</label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-[#8b5e3c] hover:text-[#5c4033]">¿Olvidaste tu contraseña?</a>
                        </div>
                    </div>
                    <div>
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#5c4033] hover:bg-[#442c1e] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#8b5e3c]">
                            Iniciar Sesion
                        </button>
                    </div>
                </form>

                <form id="signupForm" class="space-y-6 hidden">
                    <h2 class="text-2xl font-bold text-center text-[#442c1e]">Crear Cuenta</h2>
                    <div>
                        <label for="signupName" class="block text-sm font-medium text-stone-700">Nombre Completo</label>
                        <input type="text" id="signupName" required class="mt-1 block w-full px-3 py-2 border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-[#8b5e3c] focus:border-[#8b5e3c] bg-stone-50">
                    </div>
                    <div>
                        <label for="signupEmail" class="block text-sm font-medium text-stone-700">Correo Electrónico</label>
                        <input type="email" id="signupEmail" required class="mt-1 block w-full px-3 py-2 border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-[#8b5e3c] focus:border-[#8b5e3c] bg-stone-50">
                    </div>
                    <div>
                        <label for="signupPassword" class="block text-sm font-medium text-stone-700">Contraseña</label>
                        <input type="password" id="signupPassword" required class="mt-1 block w-full px-3 py-2 border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-[#8b5e3c] focus:border-[#8b5e3c] bg-stone-50">
                    </div>
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-stone-700">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" required class="mt-1 block w-full px-3 py-2 border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-[#8b5e3c] focus:border-[#8b5e3c] bg-stone-50">
                    </div>
                    <div class="flex items-center">
                        <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 text-[#8b5e3c] focus:ring-[#8b5e3c] border-stone-300 rounded">
                        <label for="terms" class="ml-2 block text-sm text-stone-700">
                            Estoy de acuerdo con los <a href="#" class="text-[#8b5e3c] hover:text-[#5c4033]">Términos y Condiciones</a>
                        </label>
                    </div>
                    <div>
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-[#5c4033] hover:bg-[#442c1e] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#8b5e3c]">
                            Crear Cuenta
                        </button>
                    </div>
                </form>

                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-stone-300"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-[#fafaf9] text-stone-500">O continuar con</span>
                        </div>
                    </div>
                    <div class="mt-6 grid grid-cols-2 gap-3">
                        <button type="button" class="w-full inline-flex justify-center py-2 px-4 border border-stone-300 rounded-md shadow-sm bg-white text-sm font-medium text-stone-700 hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#8b5e3c]">
                            <img class="h-5 w-5" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROtT2Um38jtuqcDEmCfCx3tEqzORl-PCvxarTPD9jZlFvd9djCM7Gl36bGA4X-JBaMEmk&usqp=CAU" alt="Google">
                        </button>
                        <button type="button" class="w-full inline-flex justify-center py-2 px-4 border border-stone-300 rounded-md shadow-sm bg-white text-sm font-medium text-stone-700 hover:bg-stone-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#8b5e3c]">
                            <img class="h-5 w-5" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROtT2Um38jtuqcDEmCfCx3tEqzORl-PCvxarTPD9jZlFvd9djCM7Gl36bGA4X-JBaMEmk&usqp=CAU" alt="GitHub">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
